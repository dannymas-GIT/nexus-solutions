# Nexus Solutions - nginx config for nexus-solutions.us
# Copy to /etc/nginx/sites-available/ and symlink to sites-enabled/
#   sudo cp nginx-nexus-solutions.us.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/nginx-nexus-solutions.us.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Requires: nexus-solutions Docker stack running (docker compose up -d) on port 8082

server {
    listen 80;
    server_name nexus-solutions.us www.nexus-solutions.us;
    
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    
    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
